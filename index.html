<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENÚ EL MICHI 🐱</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#c9daf8;}

.container{max-width:500px;margin:auto;padding:10px;}

h1{text-align:center;margin:10px;}
h2{text-align:center;}

button{
width:100%;
padding:15px;
margin:5px 0;
font-size:18px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.crepas{background:#ffd966;}
.platanos{background:#ffb347;}
.papas{background:#ff9966;}
.hamb{background:#f6b26b;}
.hot{background:#93c47d;}
.frap{background:#76a5af;}

.enviar{background:#6fa8dc;color:white;}
.eliminar{background:#e06666;color:white;}
.vaciar{background:#ea9999;color:white;}

#carrito{
background:white;
padding:10px;
border-radius:10px;
margin:10px 0;
max-height:200px;
overflow:auto;
}

.selected{background:#d9ead3;}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
overflow:auto;
}

.modal.crepas{background:linear-gradient(135deg,#fff2cc,#ffd966);}
.modal.platanos{background:linear-gradient(135deg,#ffe0b3,#ffb347);}
.modal.papas{background:linear-gradient(135deg,#ffd9cc,#ff9966);}
.modal.hamb{background:linear-gradient(135deg,#ffe5cc,#f6b26b);}
.modal.hot{background:linear-gradient(135deg,#d9ead3,#93c47d);}
.modal.frap{background:linear-gradient(135deg,#d0e0e3,#76a5af);}

.modal-content{
padding:15px;
background:white;
border-radius:20px;
margin:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.top-bar{display:flex;justify-content:space-between;}

.top-bar button{
background:#6fa8dc;
color:white;
padding:10px;
border-radius:10px;
}

#titulo{text-align:center;margin:10px 0;font-size:20px;}

#ops label{
display:block;
padding:10px;
margin:5px 0;
background:#f3f3f3;
border-radius:10px;
}

.modal-content button:last-child{
margin-top:10px;
background:#6fa8dc;
color:white;
padding:12px;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>🐱 MENÚ EL MICHI 🐱</h1>

<button class="crepas" onclick="crepas()">🥞 Crepas</button>
<button class="platanos" onclick="platanos()">🍌 Plátanos</button>
<button class="papas" onclick="papas()">🍟 Papas, salchipulpos y banderillas</button>
<button class="hamb" onclick="hamb()">🍔 Hamburguesas</button>
<button class="hot" onclick="hot()">🌭 Hot Dogs</button>
<button class="frap" onclick="frap()">🥤 Frappés</button>

<div id="carrito"></div>
<h2 id="total">Total: $0</h2>

<button class="enviar" onclick="enviar()">📲 Enviar pedido</button>
<button class="eliminar" onclick="eliminar()">❌ Eliminar seleccionado</button>
<button class="vaciar" onclick="vaciar()">🗑 Vaciar todo</button>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<div class="top-bar">
<button onclick="back()">⬅</button>
<button onclick="cerrar()">❌</button>
</div>
<h3 id="titulo"></h3>
<div id="ops"></div>
<button onclick="next()">Siguiente ➡️</button>
</div>
</div>

<script>
let carrito=[], seleccionado=null;
let paso=0, flujo=[], data={}, maxSel=null;

function setCategoria(cat){
document.getElementById("modal").className="modal "+cat;
}

function getEmoji(nombre){
if(nombre.includes("Crepa")) return "🥞";
if(nombre.includes("Plátanos")) return "🍌";
if(nombre.includes("Papas")||nombre.includes("Salchipulpos")||nombre.includes("Banderilla")) return "🍟";
if(nombre.includes("H.")) return "🍔";
if(nombre.includes("Hot Dog")) return "🌭";
if(nombre.includes("Frappé")) return "🥤";
return "🍽️";
}

function abrir(titulo,ops,tipo,max=null){
document.getElementById("modal").style.display="block";
document.getElementById("titulo").innerText=titulo;
maxSel=max;

let html="";
ops.forEach(o=>{
html+=`<label><input type="${tipo}" name="opcion" value="${o}" onclick="control(this)"> ${o}</label>`;
});
document.getElementById("ops").innerHTML=html;
}

function cerrar(){document.getElementById("modal").style.display="none";}
function back(){if(paso>0){paso--;flujo[paso]();}}

function getSel(){
return [...document.querySelectorAll("#ops input:checked")].map(i=>i.value);
}

function control(input){
let checks=document.querySelectorAll("#ops input");

if(input.value==="Ninguna"||input.value==="Ninguno"){
if(input.checked) checks.forEach(c=>{if(c!==input)c.checked=false;});
}else{
checks.forEach(c=>{
if(c.value==="Ninguna"||c.value==="Ninguno") c.checked=false;
});
}

if(maxSel && getSel().length>maxSel) input.checked=false;
}

function next(){
let sel=getSel();
if(!sel.length){alert("Selecciona algo");return;}

data[flujo[paso].key]=sel;
paso++;

if(paso<flujo.length) flujo[paso]();
else{cerrar();flujo.fin();}
}

function add(txt,precio){
carrito.push({nombre:txt,precio});
render();
}

function render(){
let div=document.getElementById("carrito");
div.innerHTML="";
let total=0;

carrito.forEach((i,idx)=>{
let emoji=getEmoji(i.nombre);
div.innerHTML+=`<p onclick="seleccionar(${idx})" class="${seleccionado===idx?'selected':''}">
${emoji} $${i.precio} - ${i.nombre.replace(/\n/g,"<br>")}
</p>`;
total+=i.precio;
});

document.getElementById("total").innerText="Total: $"+total;
}

function seleccionar(i){seleccionado=i;render();}
function eliminar(){if(seleccionado!=null){carrito.splice(seleccionado,1);seleccionado=null;render();}}
function vaciar(){carrito=[];render();}

/* CREPAS */
function crepas(){
setCategoria("crepas");
paso=0;data={};

flujo=[
()=>abrir("Bases",["Nutella","Lechera","Cajeta","Queso Philadelphia","Mermelada de fresa","Mermelada de zarzamora"],"checkbox",2),
()=>abrir("Frutas",["Fresa","Plátano","Durazno","Uva","Ninguna"],"checkbox"),
()=>abrir("Decoración",["Chocolate Hershey's","Lechera","Ninguna"],"radio"),
()=>abrir("Toppings",["Granillo de chocolate","Granillo de arcoiris","Gotas de chocolate","Nuez","Lunetitas","Ninguno"],"radio")
];

flujo[0].key="bases";
flujo[1].key="frutas";
flujo[2].key="dec";
flujo[3].key="top";

flujo.fin=function(){
let b=data.bases||[];
let f=(data.frutas||[]).filter(x=>x!="Ninguna");

// VALIDACIÓN
if(b.length==2 && f.length>=2){
alert("⚠️ PARA LA CREPA FRUTAL PUEDE LLEVAR MÁXIMO 1 BASE");
paso=0;
flujo[0]();
return;
}

let nb=b.length,nf=f.length;
let precio=30;

// 🔥 NUEVA REGLA
if(nb==1 && nf==4) precio=50;

// ORIGINALES
else if(nb==1&&nf==1)precio=40;
else if(nb==2&&nf==0)precio=35;
else if((nb==1&&nf==2)||(nb==2&&nf==1))precio=45;
else if(nb>=2&&nf>=2)precio=50;

let txt="Crepa\nBase: "+b.join(", ");
if(data.frutas) txt+="\nFruta: "+data.frutas.join(", ");
if(data.dec) txt+="\nDecoración: "+data.dec;
if(data.top) txt+="\nToppings: "+data.top;

txt+="\nPrecio: $"+precio;
add(txt,precio);
};

flujo[0]();
}

/* RESTO IGUAL (ya correcto) */

/* ENVIAR */
function enviar(){
let txt="🧾 Pedido - El Michi 🐱%0A%0A";
let total=0;

carrito.forEach(i=>{
let emoji=getEmoji(i.nombre);
txt+=emoji+" "+i.nombre.replace(/\n/g,"%0A")+"%0A%0A";
total+=i.precio;
});

txt+="💰 Total: $"+total;
window.open("https://wa.me/525532416109?text="+txt);
}
</script>

</body>
</html>
