<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENÚ EL MICHI 🐱</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#c9daf8;}

.container{max-width:500px;margin:auto;padding:10px;}

h1{text-align:center;margin:10px;}
h2{text-align:center;}

button{
width:100%;
padding:15px;
margin:5px 0;
font-size:18px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.crepas{background:#ffd966;}
.platanos{background:#ffb347;}
.papas{background:#ff9966;}
.hamb{background:#f6b26b;}
.hot{background:#93c47d;}
.frap{background:#76a5af;}

.enviar{background:#6fa8dc;color:white;}
.eliminar{background:#e06666;color:white;}
.vaciar{background:#ea9999;color:white;}

#carrito{
background:white;
padding:10px;
border-radius:10px;
margin:10px 0;
max-height:200px;
overflow:auto;
}

.selected{background:#d9ead3;}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
overflow:auto;
}

.modal-content{
padding:15px;
background:white;
border-radius:20px;
margin:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.top-bar{display:flex;justify-content:space-between;}

.top-bar button{
background:#6fa8dc;
color:white;
padding:10px;
border-radius:10px;
}

#titulo{text-align:center;margin:10px 0;font-size:20px;}

#ops label{
display:block;
padding:10px;
margin:5px 0;
background:#f3f3f3;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>🐱 MENÚ EL MICHI 🐱</h1>

<!-- 🔥 BOTONES RESTAURADOS EXACTOS -->
<button class="crepas" onclick="crepas()">🥞 Crepas</button>
<button class="platanos" onclick="platanos()">🍌 Plátanos</button>
<button class="papas" onclick="papas()">🍟 Papas, salchipulpos y banderillas</button>
<button class="hamb" onclick="hamb()">🍔 Hamburguesas</button>
<button class="hot" onclick="hot()">🌭 Hot Dogs</button>
<button class="frap" onclick="frap()">🥤 Frappés</button>

<div id="carrito"></div>
<h2 id="total">Total: $0</h2>

<!-- 🔥 BOTONES RESTAURADOS COMO TU ORIGINAL -->
<button class="enviar" onclick="enviar()">📲 Enviar pedido</button>
<button class="eliminar" onclick="eliminar()">❌ Eliminar seleccionado</button>
<button class="vaciar" onclick="vaciar()">🗑 Vaciar todo</button>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<div class="top-bar">
<button onclick="back()">⬅</button>
<button onclick="cerrar()">❌</button>
</div>
<h3 id="titulo"></h3>
<div id="ops"></div>
<button onclick="next()">Siguiente ➡️</button>
</div>
</div>

<script>
let carrito=[], seleccionado=null;
let paso=0, flujo=[], data={}, maxSel=null;

/* ===== MODAL ===== */
function abrir(titulo,ops,tipo,max=null){
document.getElementById("modal").style.display="block";
document.getElementById("titulo").innerText=titulo;
maxSel=max;

let html="";
ops.forEach(o=>{
html+=`<label><input type="${tipo}" name="opcion" value="${o}" onclick="control(this)"> ${o}</label>`;
});
document.getElementById("ops").innerHTML=html;
}

function cerrar(){document.getElementById("modal").style.display="none";}
function back(){if(paso>0){paso--;flujo[paso]();}}

function getSel(){
return [...document.querySelectorAll("#ops input:checked")].map(i=>i.value);
}

function control(input){
let checks=document.querySelectorAll("#ops input");
if(maxSel && getSel().length>maxSel) input.checked=false;
}

function next(){
let sel=getSel();
if(!sel.length) return alert("Selecciona algo");
data[flujo[paso].key]=sel;
paso++;
if(paso<flujo.length) flujo[paso]();
else{cerrar();flujo.fin();}
}

function add(txt,precio){
carrito.push({nombre:txt,precio});
render();
}

function render(){
let div=document.getElementById("carrito");
div.innerHTML="";
let total=0;

carrito.forEach((i,idx)=>{
div.innerHTML+=`<p onclick="seleccionar(${idx})">${i.nombre}</p>`;
total+=i.precio;
});

document.getElementById("total").innerText="Total: $"+total;
}

function seleccionar(i){seleccionado=i;render();}
function eliminar(){if(seleccionado!=null){carrito.splice(seleccionado,1);seleccionado=null;render();}}
function vaciar(){carrito=[];render();}

/* ================= CREPAS (ORIGINAL RESTAURADO) ================= */
function crepas(){
setCategoria("crepas");
paso=0;data={};

flujo=[
()=>abrir("Bases",["Nutella","Lechera","Cajeta","Queso Philadelphia","Mermelada de fresa","Mermelada de zarzamora"],"checkbox",2),
()=>abrir("Frutas",["Fresa","Plátano","Durazno","Uva","Ninguna"],"checkbox"),
()=>abrir("Decoración",["Chocolate Hershey's","Lechera","Ninguna"],"radio"),
()=>abrir("Toppings",["Granillo de chocolate","Granillo de arcoiris","Gotas de chocolate","Nuez","Lunetitas","Ninguno"],"radio")
];

flujo[0].key="bases";
flujo[1].key="frutas";
flujo[2].key="dec";
flujo[3].key="top";

flujo.fin=function(){
let b=data.bases||[];
let f=data.frutas||[];

let precio=50;

let txt="Crepa\nBase: "+b.join(", ");
txt+="\nFruta: "+f.join(", ");
txt+="\nPrecio: $"+precio;

add(txt,precio);
};

flujo[0]();
}

/* ================= PLÁTANOS (CON PRECIOS) ================= */
function platanos(){
setCategoria("platanos");
paso=0;data={};

flujo=[
()=>abrir("Tipo",[
"Fritos ($30)",
"Árabes ($40)"
],"radio")
];

flujo[0].key="tipo";

flujo.fin=function(){
let t=data.tipo[0];
let precio=t.includes("Fritos")?30:40;
add("Plátanos "+t,precio);
};

flujo[0]();
}

/* ================= PAPAS ================= */
function papas(){
setCategoria("papas");
paso=0;data={};

flujo=[
()=>abrir("Tipo",[
"Papas a la francesa ($35)",
"Salchipulpos con papas ($45)",
"Banderilla con papas ($35)",
"Banderilla sola ($25)"
],"radio")
];

flujo[0].key="tipo";

flujo.fin=function(){
let map={
"Papas a la francesa ($35)":35,
"Salchipulpos con papas ($45)":45,
"Banderilla con papas ($35)":35,
"Banderilla sola ($25)":25
};

let t=data.tipo[0];
add(t,map[t]);
};

flujo[0]();
}

/* ================= HAMBURGUESAS ================= */
function hamb(){
setCategoria("hamb");
paso=0;data={};

flujo=[
()=>abrir("Tipo",[
"Clásica ($55)",
"Hawaiana ($60)",
"Especial ($65)"
],"radio"),
()=>abrir("Con papas",[
"Con papas (+10)",
"Sin papas"
],"radio")
];

flujo[0].key="tipo";
flujo[1].key="papas";

flujo.fin=function(){
let t=data.tipo[0];
let con=data.papas[0]==="Con papas (+10)";

let base=55;
if(t.includes("Hawaiana")) base=60;
if(t.includes("Especial")) base=65;

let precio=base+(con?10:0);

add(t,precio);
};

flujo[0]();
}

/* ================= HOT DOGS ================= */
function hot(){
setCategoria("hot");
paso=0;data={};

flujo=[
()=>abrir("Tipo",["Sencillo","Especial"],"radio"),
()=>abrir("Cantidad",["1","2","3"],"radio")
];

flujo[0].key="tipo";
flujo[1].key="cant";

flujo.fin=function(){
let tipo=data.tipo[0];
let cant=parseInt(data.cant[0]);

let precios={
"Sencillo":{1:20,2:40,3:55},
"Especial":{1:25,2:50,3:70}
};

let key=tipo;
let precio=precios[key][cant];

add(`Hot Dog ${key} x${cant} (con todo)`,precio);
};

flujo[0]();
}

/* ================= FRAPPÉS ================= */
function frap(){
setCategoria("frap");
paso=0;data={};

flujo=[
()=>abrir("Tipo",[
"Galleta Oreo",
"Mazapán",
"Frapuccino",
"Fresa"
],"radio"),
()=>abrir("Tamaño",[
"Chico",
"Grande"
],"radio")
];

flujo[0].key="tipo";
flujo[1].key="tam";

flujo.fin=function(){
let t=data.tipo[0];
let s=data.tam[0];

let precios={
"Oreo":{Chico:30,Grande:50},
"Mazapán":{Chico:30,Grande:50},
"Frapuccino":{Chico:30,Grande:50},
"Fresa":{Chico:35,Grande:60}
};

let key=t.includes("Fresa")?"Fresa":"Oreo";

let precio=precios[key][s];

add(`${t} ${s}`,precio);
};

flujo[0]();
}

/* ================= ENVIAR ================= */
function enviar(){
let txt="Pedido%0A%0A";
let total=0;

carrito.forEach(i=>{
txt+=i.nombre+"%0A";
total+=i.precio;
});

txt+="%0ATotal: $"+total;
window.open("https://wa.me/525532416109?text="+txt);
}
</script>

</body>
</html>
