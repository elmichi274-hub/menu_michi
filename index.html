<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENÚ EL MICHI 🐱</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#c9daf8;}
.container{max-width:500px;margin:auto;padding:10px;}
h1{text-align:center;margin:10px;}
h2{text-align:center;}

button{
width:100%;
padding:15px;
margin:5px 0;
font-size:18px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.crepas{background:#ffd966;}
.platanos{background:#ffb347;}
.papas{background:#ff9966;}
.hamb{background:#f6b26b;}
.hot{background:#93c47d;}
.frap{background:#76a5af;}

.enviar{background:#6fa8dc;color:white;}
.eliminar{background:#e06666;color:white;}
.vaciar{background:#ea9999;color:white;}

#carrito{
background:white;
padding:10px;
border-radius:10px;
margin:10px 0;
max-height:200px;
overflow:auto;
}

#carrito::-webkit-scrollbar {
width:6px;
}
#carrito::-webkit-scrollbar-thumb {
background:#999;
border-radius:10px;
}

.selected{background:#d9ead3;}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
overflow:auto;
}

.modal-content{
padding:15px;
background:white;
border-radius:20px;
margin:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.top-bar{display:flex;justify-content:space-between;}
.top-bar button{
background:#6fa8dc;
color:white;
padding:10px;
border-radius:10px;
}

#titulo{text-align:center;margin:10px 0;font-size:20px;}

#ops label{
display:block;
padding:10px;
margin:5px 0;
background:#f3f3f3;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>🐱 MENÚ EL MICHI 🐱</h1>

<button class="crepas" onclick="crepas()">🥞 Crepas</button>
<button class="platanos" onclick="platanos()">🍌 Plátanos</button>
<button class="papas" onclick="papas()">🍟 Papas, salchipulpos y banderillas</button>
<button class="hamb" onclick="hamb()">🍔 Hamburguesas</button>
<button class="hot" onclick="hot()">🌭 Hot Dogs</button>
<button class="frap" onclick="frap()">🥤 Frappés</button>

<div id="carrito"></div>
<h2 id="total">Total: $0</h2>

<button class="enviar" onclick="enviar()">📲 Enviar pedido</button>
<button class="eliminar" onclick="eliminar()">❌ Eliminar seleccionado</button>
<button class="vaciar" onclick="vaciar()">🗑 Vaciar todo</button>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<div class="top-bar">
<button onclick="back()">⬅</button>
<button onclick="cerrar()">❌</button>
</div>
<h3 id="titulo"></h3>
<div id="ops"></div>
<button onclick="next()">Siguiente ➡️</button>
</div>
</div>

<script>
let carrito=[], seleccionado=null;
let paso=0, flujo=[], data={}, maxSel=null;

function setCategoria(cat){
document.getElementById("modal").className="modal "+cat;
document.getElementById("modal").style.display="block";
}

/* EMOJIS */
function getEmoji(nombre){
nombre = nombre.toLowerCase();

// 🔥 prioridad principal (para evitar conflictos)
if(nombre.includes("hot dog") || nombre.includes("hotdog")) return "🌭";

if(
nombre.includes("hamburguesa") ||
nombre.includes("clásica") ||
nombre.includes("hawaiana") ||
nombre.includes("especial")
) return "🍔";

if(nombre.includes("crepa")) return "🥞";

if(nombre.includes("plátanos") || nombre.includes("platano")) return "🍌";

// 🔥 PAPAS (más completo como pediste)
if(
nombre.includes("papas") ||
nombre.includes("papas a la francesa") ||
nombre.includes("salchipulpos") ||
nombre.includes("salchipulpos con papas") ||
nombre.includes("banderilla") ||
nombre.includes("banderilla con papas") ||
nombre.includes("banderilla sola")
) return "🍟";

if(nombre.includes("frappé") || nombre.includes("frappe")) return "🥤";

return "🍽️";
}

function abrir(titulo,ops,tipo,max=null){
document.getElementById("titulo").innerText=titulo;
maxSel=max;

let html="";
ops.forEach(o=>{
html+=`<label><input type="${tipo}" name="opcion" value="${o}" onclick="control(this)"> ${o}</label>`;
});
document.getElementById("ops").innerHTML=html;
}

function cerrar(){document.getElementById("modal").style.display="none";}
function back(){if(paso>0){paso--;flujo[paso]();}}

function getSel(){
return [...document.querySelectorAll("#ops input:checked")].map(i=>i.value);
}

function control(input){
let checks=document.querySelectorAll("#ops input");

if(input.value==="Ninguna" || input.value==="Ninguno" || input.value==="Con Todo"){
if(input.checked){
checks.forEach(c=>{
if(c!==input) c.checked=false;
});
}
}else{
checks.forEach(c=>{
if(c.value==="Ninguna" || c.value==="Ninguno" || c.value==="Con Todo"){
c.checked=false;
}
});
}

if(maxSel && getSel().length>maxSel) input.checked=false;
}

function next(){
let sel=getSel();
if(!sel.length){alert("Selecciona algo");return;}

data[flujo[paso].key]=sel;
paso++;

if(paso<flujo.length) flujo[paso]();
else{cerrar();flujo.fin();}
}

function add(txt,precio){
carrito.push({nombre:txt,precio});
render();
}

function render(){
let div=document.getElementById("carrito");
div.innerHTML="";
let total=0;

carrito.forEach((i,idx)=>{
let emoji=getEmoji(i.nombre);

div.innerHTML+=`
<p style="border-bottom:1px solid #ddd;padding:5px;"
onclick="seleccionar(${idx})"
class="${seleccionado===idx?'selected':''}">
${emoji} ${i.nombre.replace(/\n/g,"<br>")}
</p>
`;

total+=i.precio;
});

document.getElementById("total").innerText="Total: $"+total;
}

function seleccionar(i){seleccionado=i;render();}
function eliminar(){if(seleccionado!=null){carrito.splice(seleccionado,1);seleccionado=null;render();}}
function vaciar(){carrito=[];render();}

/* CREPAS */
function crepas(){
setCategoria("crepas");paso=0;data={};

flujo=[
()=>abrir("Bases",["Nutella","Lechera","Cajeta","Queso Philadelphia","Mermelada de fresa","Mermelada de zarzamora"],"checkbox",2),
()=>abrir("Frutas",["Fresa","Plátano","Durazno","Uva","Ninguna"],"checkbox"),
()=>abrir("Decoración",["Chocolate Hershey's","Lechera","Ninguna"],"radio"),
()=>abrir("Toppings",["Granillo de chocolate","Granillo de arcoiris","Gotas de chocolate","Nuez","Lunetitas","Ninguno"],"radio")
];

flujo[0].key="bases";
flujo[1].key="frutas";
flujo[2].key="dec";
flujo[3].key="top";

flujo.fin=function(){
let b=data.bases||[];
let f=(data.frutas||[]).filter(x=>x!="Ninguna");

if(b.length>=2 && f.length>=4){
alert("⚠️ PARA LA CREPA FRUTAL PUEDE LLEVAR MÁXIMO 1 BASE");
paso=0;
data={};
flujo[0]();
return;
}

let nb=b.length, nf=f.length;
let precio=30;

if(nb==1 && nf==1) precio=40;
else if(nb==2 && nf==0) precio=35;
else if((nb==1 && nf==2) || (nb==2 && nf==1)) precio=45;
else if(nb>=1 && nf>=4) precio=50;
else if(nb>=2 && nf>=2) precio=50;
else if(nb>=1 && nf>=3) precio=50;
else if(nb>=2 && nf>=3) precio=50;

let txt="Crepa\nBase: "+b.join(", ");
if(f.length) txt+="\nFruta: "+f.join(", ");
if(data.dec && data.dec[0]!="Ninguna") txt+="\nDecoración: "+data.dec;
if(data.top && data.top[0]!="Ninguno") txt+="\nToppings: "+data.top;

txt+="\nPrecio: $"+precio;
add(txt,precio);
};

flujo[0]();
}

/* PLATANOS */
function platanos(){
setCategoria("platanos");paso=0;data={};

flujo=[
()=>abrir("Tipo",["Fritos - $30","Árabes - $40"],"radio"),
()=>abrir("Complementos",["Crema","Lechera","Mermelada de fresa","Ninguna"],"checkbox"),
()=>abrir("Toppings",["Granillo de chocolate","Granillo de arcoiris","Gotas de chocolate","Nuez","Lunetitas","Ninguno"],"radio")
];

flujo[0].key="tipo";
flujo[1].key="comp";
flujo[2].key="top";

flujo.fin=function(){
let precio=data.tipo[0].includes("30")?30:40;

let txt="Plátanos "+data.tipo[0].split(" - ")[0];
if(data.comp && !data.comp.includes("Ninguna"))
txt+="\nComplementos: "+data.comp.join(", ");
if(data.top && !data.top.includes("Ninguno"))
txt+="\nToppings: "+data.top;

txt+="\nPrecio: $"+precio;
add(txt,precio);
};

flujo[0]();
}

/* PAPAS */
function papas(){
setCategoria("papas");paso=0;data={};

flujo=[
()=>abrir("Tipo",[
"Papas a la francesa - $35",
"Salchipulpos con papas - $45",
"Banderilla con papas - $35",
"Banderilla sola - $25"
],"radio"),
()=>abrir("Aderezos",["Catsup","Queso amarillo","Salsa","Ninguna"],"checkbox")
];

flujo[0].key="tipo";
flujo[1].key="ad";

flujo.fin=function(){
let precio=parseInt(data.tipo[0].match(/\d+/)[0]);

let txt=data.tipo[0].split(" - ")[0];
if(data.ad && !data.ad.includes("Ninguna"))
txt+="\nAderezos: "+data.ad.join(", ");

txt+="\nPrecio: $"+precio;
add(txt,precio);
};

flujo[0]();
}

/* HAMBURGUESAS */
function hamb(){
setCategoria("hamb");paso=0;data={};

flujo=[
()=>abrir("Tipo de Hamburguesa",[
"Clásica - $55",
"Hawaiana - $60",
"Especial - $65"
],"radio"),

()=>abrir("Omitir ingredientes",[
"Jamón","Queso amarillo","Queso Oaxaca","Chiles en vinagre",
"Jitomate","Cebolla","Lechuga","Mayonesa","Mostaza","Catsup","Con Todo"
],"checkbox"),

()=>abrir("Extras",[
"Piña $8","Tocino $8","Salchicha $8","Carne $10","Ninguna"
],"checkbox"),

()=>abrir("¿Con papas o sin papas?",[
"Con papas (+$10)","Sin papas"
],"radio"),

()=> {
if(data.papas[0].includes("Con papas")){
abrir("Aderezos de papas",[
"Catsup","Queso amarillo","Salsa","Ninguna"
],"checkbox");
}else{
data.aderezos=["Ninguna"];
cerrar();
flujo.fin();
}
}
];

flujo[0].key="tipo";
flujo[1].key="sin";
flujo[2].key="extra";
flujo[3].key="papas";
flujo[4].key="aderezos";

flujo.fin=function(){
let precio=parseInt(data.tipo[0].match(/\d+/)[0]);

// papas
if(data.papas[0].includes("Con papas")) precio+=10;

// extras
(data.extra||[]).forEach(e=>{
if(e.includes("$")) precio+=parseInt(e.split("$")[1]);
});

// texto
let nombreHamb = data.tipo[0].split(" - ")[0];
let txt="Hamburguesa " + nombreHamb;

if(data.papas[0].includes("Con papas")){
txt+="\nCon papas";
}else{
txt+="\nSin papas";
}

// 🔥 SIEMPRE mostrar selección
if(data.sin){
if(data.sin.includes("Con Todo")){
txt+="\nIngredientes: <b>Con todo</b>";
}else{
txt+="\nSin: "+data.sin.join(", ");
}
}

// 🔥 extras SIEMPRE visibles
if(data.extra){
if(data.extra.includes("Ninguna")){
txt+="\nExtras: Ninguna";
}else{
txt+="\nExtras: "+data.extra.join(", ");
}
}

// aderezos papas
if(data.papas[0].includes("Con papas")){
if(data.aderezos){
if(data.aderezos.includes("Ninguna")){
txt+="\nAderezos papas: Ninguna";
}else{
txt+="\nAderezos papas: "+data.aderezos.join(", ");
}
}
}

txt+="\nPrecio: $"+precio;

add(txt,precio);
};
  
flujo[0]();
}

/* HOTDOGS */
function hot(){
setCategoria("hot");paso=0;data={};

flujo=[
()=>abrir("Tipo",["Sencillo","Especiales"],"radio"),
()=> {
if(data.tipo[0]==="Especiales"){
abrir("¿Qué cantidad?",["1 $25","2 $50","3 $70"],"radio");
}else{
abrir("¿Qué cantidad?",["1 $20","2 $40","3 $55"],"radio");
}
},
()=>abrir("Omitir ingredientes",["Mayonesa","Catsup","Jitomate","Chile jalapeño","Cebolla","Con Todo"],"checkbox")
];

flujo[0].key="tipo";
flujo[1].key="cant";
flujo[2].key="sin";

flujo.fin=function(){

// 🔥 obtener cantidad real (1,2,3)
let cantidad = data.cant[0].split(" ")[0];

// 🔥 obtener precio correcto (20,40,55...)
let precio = parseInt(data.cant[0].match(/\d+/g).pop());

let txt = `Hot Dog ${data.tipo[0]} x${cantidad}`;

// 🔥 ingredientes
if(data.sin){
if(data.sin.includes("Con Todo")){
txt += "\n<b>Con todo</b>";
}else{
txt += "\nSin: " + data.sin.join(", ");
}
}

txt += "\nPrecio: $" + precio;

add(txt, precio);
};

flujo[0]();
}

/* FRAPPES */
function frap(){
setCategoria("frap");paso=0;data={};

flujo=[
()=>abrir("Tipo",["Galleta Oreo","Mazapán","Frapuccino","Fresa"],"radio"),
()=> {
if(data.tipo[0]==="Fresa"){
abrir("Tamaño",["Chico $35","Grande $60"],"radio");
}else{
abrir("Tamaño",["Chico $30","Grande $50"],"radio");
}
}
];

flujo[0].key="tipo";
flujo[1].key="tam";

flujo.fin=function(){
let precio=parseInt(data.tam[0].match(/\d+/)[0]);

let tamaño = data.tam[0].split(" $")[0];
let txt=`Frappé ${data.tipo[0]} (${tamaño})`;
txt+=`\nPrecio: $${precio}`;

add(txt,precio);
};

flujo[0]();
}

function enviar(){
let txt="🧾 Pedido - El Michi 🐱%0A%0A";
let total=0;

carrito.forEach(i=>{
let emoji=getEmoji(i.nombre);
let texto = i.nombre
.replace(/<b>/g,"*")
.replace(/<\/b>/g,"*");

txt+=emoji+" "+texto.replace(/\n/g,"%0A")+"%0A%0A";
total+=i.precio;
});

txt+="💰 Total: $"+total;

window.open("https://wa.me/525532416109?text="+txt);
}
</script>

</body>
</html>
```
