<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENÚ EL MICHI 🐱</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#c9daf8;}
.container{max-width:500px;margin:auto;padding:10px;}

h1{text-align:center;margin:10px;}
h2{text-align:center;}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:15px;
margin:5px 0;
font-size:18px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.crepas{background:#ffd966;}
.platanos{background:#ffb347;}
.papas{background:#ff9966;}
.hamb{background:#f6b26b;}
.hot{background:#93c47d;}
.frap{background:#76a5af;}

.enviar{background:#6fa8dc;color:white;}
.eliminar{background:#e06666;color:white;}
.vaciar{background:#ea9999;color:white;}

#carrito{
background:white;
padding:10px;
border-radius:10px;
margin:10px 0;
max-height:200px;
overflow:auto;
}

.selected{background:#d9ead3;}
</style>
</head>

<body>

<div class="container">

<h1>MENÚ EL MICHI 🐱</h1>

<input id="cliente" placeholder="👤 Nombre del cliente">

<button class="crepas" onclick="addSimple('Crepa',40)">🥞 Crepas</button>
<button class="platanos" onclick="addSimple('Plátanos',30)">🍌 Plátanos</button>
<button class="papas" onclick="addSimple('Papas especiales',35)">🍟 Papas</button>
<button class="hamb" onclick="addSimple('Hamburguesa',60)">🍔 Hamburguesas</button>
<button class="hot" onclick="addSimple('Hot Dog',25)">🌭 Hot Dogs</button>
<button class="frap" onclick="addSimple('Frappé',40)">🥤 Frappés</button>

<div id="carrito"></div>
<h2 id="total">Total: $0</h2>

<button class="enviar" onclick="enviar()">📲 Enviar pedido</button>
<button class="eliminar" onclick="eliminar()">❌ Eliminar seleccionado</button>
<button class="vaciar" onclick="vaciar()">🗑 Vaciar todo</button>

</div>

<script>
let carrito=[], seleccionado=null;

// AGREGAR PRODUCTO RÁPIDO (SIN BUGS)
function addSimple(nombre,precio){
carrito.push({nombre,precio});
render();
}

// RENDER
function render(){
let div=document.getElementById("carrito");
div.innerHTML="";
let total=0;

carrito.forEach((i,idx)=>{
div.innerHTML+=`<p onclick="seleccionar(${idx})" class="${seleccionado===idx?'selected':''}">
$${i.precio} - ${i.nombre}</p>`;
total+=i.precio;
});

document.getElementById("total").innerText="Total: $"+total;
}

function seleccionar(i){seleccionado=i;render();}
function eliminar(){
if(seleccionado!=null){
carrito.splice(seleccionado,1);
seleccionado=null;
render();
}
}

function vaciar(){
carrito=[];
render();
}

// ENVIAR
function enviar(){

let nombre=document.getElementById("cliente").value.trim();

if(!nombre){
alert("Ingresa el nombre");
return;
}

if(carrito.length===0){
alert("Agrega productos");
return;
}

let txt="🐱 EL MICHI 🐱%0A%0A";
txt+="Cliente: "+nombre+"%0A%0A";

let total=0;

carrito.forEach(i=>{
txt+="• "+i.nombre+" - $"+i.precio+"%0A";
total+=i.precio;
});

txt+="%0ATotal: $"+total;

window.open("https://wa.me/525532416109?text="+txt);
}
</script>

</body>
</html>
