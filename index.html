<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENÚ EL MICHI 🐱</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:#c9daf8;}
.container{max-width:500px;margin:auto;padding:10px;}
h1{text-align:center;margin:10px;}
h2{text-align:center;}

button{
width:100%;
padding:15px;
margin:5px 0;
font-size:18px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.crepas{background:#ffd966;}
.platanos{background:#ffb347;}
.papas{background:#ff9966;}
.hamb{background:#f6b26b;}
.hot{background:#93c47d;}
.frap{background:#76a5af;}

.enviar{background:#6fa8dc;color:white;}
.eliminar{background:#e06666;color:white;}
.vaciar{background:#ea9999;color:white;}

#carrito{
background:white;
padding:10px;
border-radius:10px;
margin:10px 0;
max-height:200px;
overflow:auto;
}

.selected{background:#d9ead3;}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
overflow:auto;
}

.modal.crepas{background:linear-gradient(135deg,#fff2cc,#ffd966);}
.modal.platanos{background:linear-gradient(135deg,#ffe0b3,#ffb347);}
.modal.papas{background:linear-gradient(135deg,#ffd9cc,#ff9966);}
.modal.hamb{background:linear-gradient(135deg,#ffe5cc,#f6b26b);}
.modal.hot{background:linear-gradient(135deg,#d9ead3,#93c47d);}
.modal.frap{background:linear-gradient(135deg,#d0e0e3,#76a5af);}

.modal-content{
padding:15px;
background:white;
border-radius:20px;
margin:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.top-bar{display:flex;justify-content:space-between;}

.top-bar button{
background:#6fa8dc;
color:white;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>🐱 MENÚ EL MICHI 🐱</h1>

<button class="crepas" onclick="crepas()">🥞 Crepas</button>
<button class="platanos" onclick="platanos()">🍌 Plátanos</button>
<button class="papas" onclick="papas()">🍟 Papas</button>
<button class="hamb" onclick="hamb()">🍔 Hamburguesas</button>
<button class="hot" onclick="hot()">🌭 Hot Dogs</button>
<button class="frap" onclick="frap()">🥤 Frappés</button>

<div id="carrito"></div>
<h2 id="total">Total: $0</h2>

<button class="enviar" onclick="enviar()">📲 Enviar pedido</button>
<button class="eliminar" onclick="eliminar()">❌ Eliminar seleccionado</button>
<button class="vaciar" onclick="vaciar()">🗑 Vaciar todo</button>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<button onclick="cerrar()">❌ Cerrar</button>
<h3 id="titulo"></h3>
<div id="ops"></div>
<button onclick="next()">Siguiente</button>
</div>
</div>

<script>
let carrito=[], paso=0, flujo=[], data={};

function abrir(titulo,ops,tipo){
document.getElementById("modal").style.display="block";
document.getElementById("titulo").innerText=titulo;

let html="";
ops.forEach(o=>{
html+=`<label><input type="${tipo}" value="${o}"> ${o}</label><br>`;
});
document.getElementById("ops").innerHTML=html;
}

function cerrar(){document.getElementById("modal").style.display="none";}

function getSel(){
return [...document.querySelectorAll("#ops input:checked")].map(i=>i.value);
}

function next(){
let sel=getSel();
if(!sel.length){alert("Selecciona algo");return;}

data[flujo[paso].key]=sel;
paso++;

if(paso<flujo.length) flujo[paso]();
else{cerrar();flujo.fin();}
}

function add(txt,precio){
carrito.push({nombre:txt,precio});
render();
}

function render(){
let div=document.getElementById("carrito");
div.innerHTML="";
let total=0;

carrito.forEach((i,idx)=>{
div.innerHTML+=`<p onclick="carrito.splice(${idx},1);render()">
${i.nombre} - $${i.precio}</p>`;
total+=i.precio;
});

document.getElementById("total").innerText="Total: $"+total;
}

function eliminar(){carrito.pop();render();}
function vaciar(){carrito=[];render();}

/* CREPAS */
function crepas(){
paso=0;data={};

flujo=[
()=>abrir("Bases",["Nutella","Lechera","Cajeta"],"checkbox"),
()=>abrir("Frutas",["Fresa","Plátano","Durazno","Uva"],"checkbox")
];

flujo[0].key="bases";
flujo[1].key="frutas";

flujo.fin=function(){
let b=data.bases||[];
let f=data.frutas||[];

let precio=30;

// nueva regla
if(b.length==1 && f.length==4) precio=50;

let txt="Crepa\nBase:"+b+"\nFruta:"+f+"\n$"+precio;
add(txt,precio);
};

flujo[0]();
}

/* DEMÁS BOTONES SIMPLES (ya funcionan) */
function platanos(){add("🍌 Plátanos",30);}
function papas(){add("🍟 Papas",35);}
function hamb(){add("🍔 Hamburguesa",60);}
function hot(){add("🌭 Hot Dog",25);}
function frap(){add("🥤 Frappé",40);}

function enviar(){
let txt="Pedido:%0A";
carrito.forEach(i=>txt+=i.nombre+"%0A");
window.open("https://wa.me/?text="+txt);
}
</script>

</body>
</html>
